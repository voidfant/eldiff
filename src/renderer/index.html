<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElDiff</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-orb orb-c"></div>

  <main class="app-shell">
    <header class="topbar" data-tauri-drag-region>
      <div class="title-stack" data-tauri-drag-region>
        <span class="eyebrow">ElDiff</span>
        <div class="title-row" data-tauri-drag-region>
          <h1>Liquid Glass Diff</h1>
          <span class="title-chip" id="appearance-pill">macOS desktop</span>
        </div>
      </div>
      <div class="topbar-actions no-drag">
        <button class="icon-btn" id="btn-history" type="button">History</button>
        <div class="status-pill" id="status-pill">Ready</div>
      </div>
    </header>

    <section class="toolbar glass">
      <div class="toolbar-actions">
        <button class="action-btn" id="btn-open-left" type="button">Open Original</button>
        <button class="action-btn" id="btn-open-right" type="button">Open Modified</button>
        <button class="action-btn subtle" id="btn-save-left" type="button">Save Original</button>
        <button class="action-btn subtle" id="btn-save-right" type="button">Save Modified</button>
        <button class="action-btn accent" id="btn-export" type="button">Export Diff</button>
      </div>

      <div class="toolbar-controls">
        <div class="seg-group">
          <button class="seg-btn active" data-mode="side" id="btn-side" type="button">Side by Side</button>
          <button class="seg-btn" data-mode="inline" id="btn-inline" type="button">Inline</button>
        </div>

        <label class="toggle-pill">
          <input type="checkbox" id="chk-ws">
          <span>Ignore whitespace</span>
        </label>

        <label class="toggle-pill">
          <input type="checkbox" id="chk-case">
          <span>Ignore case</span>
        </label>
      </div>

      <div class="stats-row" id="stats"></div>
    </section>

    <aside class="history-panel glass" id="history-panel" aria-hidden="true">
      <div class="history-header">
        <div>
          <span class="eyebrow">Recent</span>
          <h2>Latest comparisons</h2>
        </div>
        <button class="action-link" id="btn-clear-history" type="button">Clear all</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </aside>

    <section class="editor-grid">
      <article class="editor-card glass">
        <div class="card-header">
          <div>
            <span class="card-label">Original</span>
            <div class="file-meta" id="meta-left">No file loaded</div>
          </div>
          <span class="line-count" id="lc-left">0 lines</span>
        </div>
        <textarea id="ta-left" placeholder="Paste original text here…" spellcheck="false"></textarea>
      </article>

      <article class="editor-card glass">
        <div class="card-header">
          <div>
            <span class="card-label">Modified</span>
            <div class="file-meta" id="meta-right">No file loaded</div>
          </div>
          <span class="line-count" id="lc-right">0 lines</span>
        </div>
        <textarea id="ta-right" placeholder="Paste modified text here…" spellcheck="false"></textarea>
      </article>
    </section>

    <section class="diff-card glass">
      <div class="card-header">
        <div>
          <span class="card-label">Changes</span>
          <div class="diff-mode" id="mode-label">Side by Side</div>
        </div>
        <span class="line-count" id="diff-summary">Waiting for input</span>
      </div>
      <div class="diff-scroll">
        <div id="diff-out"></div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" hidden></div>

  <script src="./app.js"></script>
</body>
</html>
